<form method="POST" enctype="multipart/form-data">

    <input type="text"
           name="name"
           placeholder="Tên sản phẩm">
    
    <input type="text"
           name="category"
           placeholder="Danh mục">

    <input type="number"
           name="price"
           placeholder="Giá">

    <input type="file"
           name="image">

    <button type="submit">
        Thêm sản phẩm
    </button>

</form>
