<!DOCTYPE html>
<html>
<head>
    <title>Chỉnh sửa sản phẩm</title>
</head>
<body>

<h2>Chỉnh sửa sản phẩm</h2>

<form method="POST" enctype="multipart/form-data">

    <input
        type="text"
        name="name"
        value="{{ product.name }}"
        required>

    <input
        type="text"
        name="category"
        value="{{ product.category }}"
        required>

    <input
        type="number"
        step="0.01"
        name="price"
        value="{{ product.price }}"
        required>

    <input
        type="number"
        name="quantity"
        value="{{ product.quantity }}"
        required>

    <input
        type="text"
        name="code"
        value="{{ product.code }}"
        required>

    <br><br>

    <img
        src="{{ url_for('static', filename='uploads/' + product.image) }}"
        width="120">

    <br><br>

    <input
        type="file"
        name="image">

    <br><br>

    <button type="submit">
        Cập nhật
    </button>

</form>

</body>
</html>
